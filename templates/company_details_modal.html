<!-- Company Details Modal -->
<div id="companyDetailModal" class="modal">
    <div class="modal-overlay"></div>
    <div class="modal-container company-details-modal modern-startup">
        <div class="modal-header startup-header">
            <div class="company-header">
                <h2 id="companyDetailName" class="company-title"></h2>
                <div class="company-badges">
                    <span id="companyDetailIndustry" class="badge industry-badge"></span>
                    <span id="companyDetailStage" class="badge stage-badge"></span>
                    <span id="companyDetailRating" class="badge rating-badge"></span>
                </div>
            </div>
            <button class="modal-close modern-close" onclick="closeCompanyDetailModal()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <div class="modal-body startup-body">
            <div class="detail-section">
                <div class="detail-group">
                    <div class="detail-item">
                        <i class="fas fa-globe detail-icon"></i>
                        <div class="detail-content">
                            <label class="detail-label">Website</label>
                            <div id="companyDetailWebsite" class="detail-value"></div>
                        </div>
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-envelope detail-icon"></i>
                        <div class="detail-content">
                            <label class="detail-label">Email</label>
                            <div id="companyDetailEmail" class="detail-value"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="detail-section">
                <h3 class="section-title">
                    <i class="fas fa-info-circle"></i>
                    About
                </h3>
                <div id="companyDetailDescription" class="detail-value description-value"></div>
            </div>

            <div class="detail-section">
                <h3 class="section-title">
                    <i class="fas fa-sticky-note"></i>
                    Notes
                </h3>
                <textarea id="companyNotes" class="modern-textarea" placeholder="Add your notes about this company..."></textarea>
            </div>
        </div>

        <div class="modal-footer startup-footer">
            <div class="footer-actions">
                <button type="button" class="btn btn-danger" onclick="confirmDeleteCompany()">
                    <i class="fas fa-trash"></i>
                    Delete Company
                </button>
                <div class="footer-right">
                    <button type="button" class="btn btn-outline" onclick="closeCompanyDetailModal()">
                        <i class="fas fa-times"></i>
                        Close
                    </button>
                    <button type="button" class="btn btn-primary" onclick="saveCompanyNotes()">
                        <i class="fas fa-save"></i>
                        Save Notes
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div id="deleteConfirmModal" class="modal">
    <div class="modal-overlay"></div>
    <div class="modal-container delete-confirm-modal">
        <div class="modal-header">
            <h3>
                <i class="fas fa-exclamation-triangle"></i>
                Confirm Deletion
            </h3>
            <button class="modal-close" onclick="closeDeleteConfirmModal()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body">
            <p>Are you sure you want to delete <span id="deleteCompanyName"></span>? This action cannot be undone.</p>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-outline" onclick="closeDeleteConfirmModal()">
                <i class="fas fa-times"></i>
                Cancel
            </button>
            <button type="button" class="btn btn-danger" onclick="deleteCompany()">
                <i class="fas fa-trash"></i>
                Delete
            </button>
        </div>
    </div>
</div>
