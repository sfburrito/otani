<!-- Company Details Modal -->
<div id="companyDetailModal" class="modal">
    <div class="modal-overlay"></div>
    <div class="modal-container">
        <div class="modal-header">
            <h2 id="companyDetailName"></h2>
            <button class="modal-close" onclick="closeCompanyDetailModal()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body">
            <div class="company-details">
                <div class="detail-row">
                    <div class="detail-label">Industry:</div>
                    <div id="companyDetailIndustry" class="detail-value"></div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Stage:</div>
                    <div id="companyDetailStage" class="detail-value"></div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Rating:</div>
                    <div id="companyDetailRating" class="detail-value"></div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Website:</div>
                    <div id="companyDetailWebsite" class="detail-value"></div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Email:</div>
                    <div id="companyDetailEmail" class="detail-value"></div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Description:</div>
                    <div id="companyDetailDescription" class="detail-value"></div>
                </div>
                <div class="detail-row">
                    <div class="detail-label">Notes:</div>
                    <textarea id="companyNotes" class="detail-notes" placeholder="Add your notes here..."></textarea>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-outline" onclick="closeCompanyDetailModal()">
                <i class="fas fa-times"></i>
                <span>Close</span>
            </button>
            <button type="button" class="btn btn-primary" onclick="saveCompanyNotes()">
                <i class="fas fa-save"></i>
                <span>Save Notes</span>
            </button>
        </div>
    </div>
</div>
