<script>
let currentCompanyId = null;

function openCompanyDetails(companyId) {
    currentCompanyId = companyId;
    const company = window.companies.find(c => c.id === companyId);
    if (!company) return;
    
    // Populate modal fields
    document.getElementById('modal-company-name').textContent = company.name;
    document.getElementById('modal-company-industry').textContent = company.industry;
    document.getElementById('modal-company-stage').textContent = company.stage;
    document.getElementById('modal-company-location').textContent = company.location;
    document.getElementById('modal-company-rating').textContent = company.rating;
    
    // Show modal
    document.getElementById('companyDetailsModal').style.display = 'block';
}

function closeCompanyDetailModal() {
    document.getElementById('companyDetailsModal').style.display = 'none';
}

function confirmDeleteCompany() {
    document.getElementById('companyDetailsModal').style.display = 'none';
    document.getElementById('deleteConfirmModal').style.display = 'block';
}

function closeDeleteConfirmModal() {
    document.getElementById('deleteConfirmModal').style.display = 'none';
    document.getElementById('companyDetailsModal').style.display = 'block';
}

function deleteCompany() {
    if (!currentCompanyId) return;
    
    fetch(`/delete_company/${currentCompanyId}`, {
        method: 'DELETE',
    })
    .then(response => {
        if (response.ok) {
            // Remove company from local data
            window.companies = window.companies.filter(c => c.id !== currentCompanyId);
            // Re-render table
            window.renderCompanies(window.companies);
            // Close modals
            document.getElementById('deleteConfirmModal').style.display = 'none';
            document.getElementById('companyDetailsModal').style.display = 'none';
            // Show success message
            showMessage('Company deleted successfully');
        } else {
            showMessage('Error deleting company', 'error');
        }
    })
    .catch(error => {
        console.error('Error:', error);
        showMessage('Error deleting company', 'error');
    });
}

function saveCompanyNotes() {
    // Add your save company notes logic here
    console.log("Save company notes button clicked");
}

function showMessage(message, type = 'success') {
    const flashMessages = document.querySelector('.flash-messages');
    const messageDiv = document.createElement('div');
    messageDiv.className = `alert alert-${type}`;
    messageDiv.textContent = message;
    flashMessages.appendChild(messageDiv);
    setTimeout(() => messageDiv.remove(), 3000);
}
</script>
