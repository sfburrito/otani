<!--
    Component: Main Content
    Description: Primary content area for investor preferences page
    Styles: ../css/investorpreferences.css
    
    Structure:
    - Four category sections in grid layout
    - Additional preferences section with textarea
    
    Categories:
    1. Industry - Tech and innovation sectors
    2. Stage - Investment stages from Seed to Growth
    3. Location - Geographic investment regions
    4. Investment Amount - Investment size ranges
-->

<!-- Main content section - Primary container -->
<main class="main-content">
    <div class="title-row">
        <h2 class="page-title">Investor Preferences</h2>
        <button class="save-button">Save Preferences</button>
    </div>
    
    <!-- Category grid container -->
    <div class="categories">
        <!-- Industry category -->
        <div class="category">
            <h3 class="category-header">Industry</h3>
            <select multiple class="category-select" name="industry">
                <option>Artificial Intelligence/Machine Learning</option>
                <option>Climate Tech/Sustainability</option>
                <option>Healthcare/Biotech</option>
                <option>Enterprise SaaS</option>
            </select>
        </div>
        
        <!-- Investment stage category -->
        <div class="category">
            <h3 class="category-header">Stage</h3>
            <select multiple class="category-select" name="stage">
                <option>Seed</option>
                <option>Series A</option>
                <option>Series B</option>
                <option>Growth</option>
            </select>
        </div>
        
        <!-- Geographic location category -->
        <div class="category">
            <h3 class="category-header">Location</h3>
            <select multiple class="category-select" name="location">
                <option>North America</option>
                <option>Europe</option>
                <option>Asia</option>
                <option>Other</option>
            </select>
        </div>
        
        <!-- Investment amount category -->
        <div class="category">
            <h3 class="category-header">Investment Amount</h3>
            <select multiple class="category-select" name="investment_amount">
                <option>$1m to $5m</option>
                <option>$5m to $15m</option>
                <option>$15m to $30m</option>
                <option>$30m to $50m</option>
            </select>
        </div>
    </div>

    <!-- Additional preferences section -->
    <div class="additional-section">
        <h3 class="category-header">Additional Preferences</h3>
        <textarea class="preferences-input" 
                  placeholder="Enter any additional investment preferences..."></textarea>
    </div>
</main>
